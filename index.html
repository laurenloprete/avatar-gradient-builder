<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neutral:      #C4C4C4;
      --track-empty:  #333333;
      --track-filled: #888888;
      --thumb:        #AAAAAA;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background: #1a1a1a;
      font-family: Helvetica, Arial, sans-serif;
    }

    /* ── Avatar ──────────────────────────────────────────── */
    #avatar {
      position: fixed;
      top: 90px;
      left: 90px;
      width: 308px;   /* 154px × 2 */
      height: 308px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #avatar-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #avatar-initials {
      position: relative;
      z-index: 1;
      color: #fff;
      font-family: Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 123px;  /* 40% of 308px */
      line-height: 1;
      letter-spacing: -0.01em;
      user-select: none;
      pointer-events: none;
    }

    /* ── Bottom input area ───────────────────────────────── */
    #bottom-area {
      position: fixed;
      bottom: 90px;
      left: 90px;
      right: 200px;         /* clear + dice cluster in bottom-right */
      display: flex;
      align-items: baseline;
    }

    #name-input {
      flex: 1;
      font-family: Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 100px;
      letter-spacing: -2px;
      line-height: 1.0;
      color: #FFFFFF;
      caret-color: #555;
      outline: none;
      border: none;
      background: none;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    #name-input:empty::before {
      content: attr(data-placeholder);
      color: rgba(196, 196, 196, 0.6);
      pointer-events: none;
    }

    /* ── Bottom-right cluster (clear + dice) ─────────────── */
    #bottom-right {
      position: fixed;
      bottom: 90px;
      right: 90px;
      display: flex;
      align-items: baseline;  /* text baselines aligned */
      gap: 20px;
    }

    #clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      padding: 0;
      transition: color 0.15s;
    }
    #clear-btn:hover { color: #999; }

    #dice-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 26px;
      line-height: 1;
      color: #666;
      padding: 0;
      transition: color 0.15s;
    }
    #dice-btn:hover { color: #999; }

    /* ── Palette swatches ────────────────────────────────── */
    .ctrl-divider {
      height: 1px;
      background: #2A2A2A;
      margin: 2px 0;
    }

    #swatch-group {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 1;
      transition: opacity 0.2s;
    }
    #swatch-group.dimmed { opacity: 0.28; }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      display: block;
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .swatch:hover {
      transform: scale(1.2);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.35);
    }
    /* Hide the native color input visually but keep it functional */
    .swatch input[type="color"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    /* GEN pill — active when in generative mode, dimmed when palette is driving */
    #mode-btn {
      background: #333;
      border: 1px solid #484848;
      border-radius: 100px;
      cursor: pointer;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #AAAAAA;
      padding: 3px 9px;
      flex-shrink: 0;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    #mode-btn:hover { color: #DDDDDD; border-color: #666; }

    /* Disabled look when palette mode is active */
    #mode-btn.pal-active {
      background: transparent;
      border-color: #272727;
      color: #353535;
    }
    #mode-btn.pal-active:hover {
      border-color: #3A3A3A;
      color: #555;
    }

    /* ── Controls panel ──────────────────────────────────── */
    #controls {
      position: fixed;
      top: 90px;
      right: 90px;
      display: flex;
      flex-direction: column;
      gap: 22px;        /* 18 × 1.2 */
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 12px;        /* 10 × 1.2 */
    }

    .ctrl-label {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 12px;  /* 10 × 1.2 */
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      width: 98px;      /* 82 × 1.2 */
      text-align: right;
      flex-shrink: 0;
    }

    .ctrl-icon {
      flex-shrink: 0;
      display: block;
      opacity: 0.5;
      width: 26px;    /* fixed width — keeps all slider tracks left-aligned */
      height: 18px;   /* fixed height — keeps all rows the same height */
      overflow: visible;
    }

    /* ── Range slider ────────────────────────────────────── */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 132px;     /* 110 × 1.2 */
      height: 2px;
      border-radius: 1px;
      outline: none;
      cursor: pointer;
      background: linear-gradient(
        to right,
        var(--track-filled) 0%, var(--track-filled) var(--pct, 0%),
        var(--track-empty)  var(--pct, 0%), var(--track-empty)  100%
      );
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--thumb);
      cursor: pointer;
      transition: background 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { background: #DDDDDD; }

    /* Firefox */
    input[type="range"]::-moz-range-track {
      height: 2px;
      background: var(--track-empty);
      border-radius: 1px;
    }
    input[type="range"]::-moz-range-progress {
      height: 2px;
      background: var(--track-filled);
      border-radius: 1px;
    }
    input[type="range"]::-moz-range-thumb {
      border: none;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--thumb);
      cursor: pointer;
    }

    /* ── Responsive: tablet (≤ 900px) ────────────────────── */
    @media (max-width: 900px) {
      #avatar {
        width: 220px;
        height: 220px;
        top: 50px;
        left: 50px;
      }
      #avatar-initials { font-size: 88px; }
      #controls { top: 50px; right: 50px; }
      #bottom-area { bottom: 50px; left: 50px; right: 160px; }
      #bottom-right { bottom: 50px; right: 50px; }
      #name-input { font-size: 72px; }
    }

    /* ── Responsive: mobile (≤ 640px) ────────────────────── */
    @media (max-width: 640px) {
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 24px 56px;
        overflow-y: auto;
        overflow-x: hidden;
      }

      /* Avatar — centered, proportional to viewport */
      #avatar {
        position: relative;
        top: auto;
        left: auto;
        width: min(200px, 56vw);
        height: min(200px, 56vw);
        order: 0;
        margin-bottom: 32px;
        flex-shrink: 0;
      }

      #avatar-initials {
        font-size: min(80px, 22.4vw); /* ~40% of avatar */
      }

      /* Name input — centered, below avatar */
      #bottom-area {
        position: relative;
        bottom: auto;
        left: auto;
        right: auto;
        width: 100%;
        justify-content: center;
        order: 1;
        margin-bottom: 20px;
      }

      #name-input {
        font-size: clamp(32px, 10vw, 56px);
        letter-spacing: -1px;
        text-align: center;
        width: 100%;
      }

      /* Clear + Dice — below name input */
      #bottom-right {
        position: relative;
        bottom: auto;
        right: auto;
        order: 2;
        margin-bottom: 40px;
        gap: 24px;
      }

      #clear-btn { font-size: 14px; }
      #dice-btn  { font-size: 28px; }

      /* Controls — below buttons, full width */
      #controls {
        position: relative;
        top: auto;
        right: auto;
        width: 100%;
        order: 3;
        gap: 20px;
      }

      .ctrl-row { gap: 8px; }

      .ctrl-label {
        width: 76px;
        font-size: 10px;
        letter-spacing: 0.06em;
      }

      .ctrl-icon {
        width: 20px;
        height: 16px;
      }

      /* Sliders fill remaining space — tall element = large touch target */
      input[type="range"] {
        flex: 1;
        min-width: 60px;
        width: auto;
        height: 44px;
        background: none; /* gradient moved to track pseudo-element below */
      }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 2px;
        border-radius: 1px;
        background: linear-gradient(
          to right,
          var(--track-filled) 0%, var(--track-filled) var(--pct, 0%),
          var(--track-empty)  var(--pct, 0%), var(--track-empty)  100%
        );
      }

      /* Larger thumb for touch */
      input[type="range"]::-webkit-slider-thumb {
        width: 20px;
        height: 20px;
        margin-top: -9px;
      }
      input[type="range"]::-moz-range-thumb {
        width: 20px;
        height: 20px;
      }

      /* Palette row — allow swatch group to wrap if needed */
      #swatch-group { gap: 9px; }
      .swatch { width: 18px; height: 18px; }
    }

    /* ══════════════════════════════════════════════════════
       PAGE NAVIGATION
    ══════════════════════════════════════════════════════ */
    #page-nav {
      position: fixed;
      bottom: 36px;
      left: 90px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 200;
    }
    .nav-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.35;
      transition: opacity 0.2s;
    }
    .nav-btn:hover { opacity: 0.65; }
    .nav-btn.active { opacity: 1; }

    /* single dot */
    .nav-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
    }

    /* 3×3 grid icon */
    .nav-grid-icon {
      display: grid;
      grid-template-columns: repeat(3, 3px);
      grid-template-rows: repeat(3, 3px);
      gap: 2.5px;
    }
    .nav-grid-icon span {
      display: block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #fff;
    }

    @media (max-width: 640px) {
      #page-nav { bottom: 24px; left: 24px; }
    }

    /* ══════════════════════════════════════════════════════
       PAGE 2 — AVATAR GRID
    ══════════════════════════════════════════════════════ */
    #page-2 {
      display: none;
      position: fixed;
      top: 90px;
      left: 90px;
      right: 490px; /* controls (~306px) + 90px right margin + 90px gap */
      bottom: 90px;
      overflow: hidden;
      align-items: flex-start;
      justify-content: flex-start;
    }
    body.page-2 #page-2   { display: flex; }
    body.page-2 #avatar   { display: none; }
    body.page-2 #bottom-area  { display: none; }
    body.page-2 #bottom-right { display: none; }

    #avatar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
      gap: 16px;
      width: 100%;
    }

    .grid-avatar {
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }
    .grid-avatar svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 900px) {
      #page-2 { right: 360px; top: 50px; bottom: 100px; left: 50px; }
      #avatar-grid { gap: 12px; }
    }
    @media (max-width: 640px) {
      /* On page 2 mobile: pull grid into normal flow so controls stack below */
      body.page-2 #page-2 {
        display: block;
        position: relative;
        top: auto; left: auto; right: auto; bottom: auto;
        width: 100%;
        padding: 0 0 24px;
        overflow: visible;
        background: transparent;
        order: 0; /* renders before #controls (order:3) */
      }
      #avatar-grid {
        grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
        gap: 10px;
      }
    }

    /* ══════════════════════════════════════════════════════
       FOOTER
    ══════════════════════════════════════════════════════ */
    .site-footer {
      position: fixed;
      bottom: 36px;
      right: 90px;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #444;
      text-align: right;
    }
    .site-footer a {
      color: #666;
      text-decoration: none;
      transition: color 0.15s;
    }
    .site-footer a:hover { color: #999; }

    @media (max-width: 640px) {
      .site-footer { display: none; }
    }

    /* ── Avatar context menu ─────────────────────────────── */
    #avatar-ctx-menu {
      display: none;
      position: fixed;
      z-index: 1000;
      background: #242424;
      border: 1px solid #404040;
      border-radius: 8px;
      padding: 4px;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #avatar-ctx-menu button {
      display: block;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      color: #e0e0e0;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      border-radius: 5px;
      letter-spacing: 0.02em;
    }
    #avatar-ctx-menu button:hover {
      background: #333;
      color: #fff;
    }
  </style>
</head>
<body>

<!-- Avatar right-click context menu -->
<div id="avatar-ctx-menu">
  <button id="ctx-download-png">Download PNG</button>
</div>

<!-- Avatar circle -->
<div id="avatar">
  <svg id="avatar-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 308 308">
    <defs>
      <!--
        The mesh filter: turbulence displaces the colored blobs,
        then a gaussian blur blends the edges organically.
        High displacement (~80% of avatar size ≈ 120px scale).
      -->
      <filter id="blob-mesh" x="-55%" y="-55%" width="210%" height="210%"
              color-interpolation-filters="sRGB">
        <feTurbulence id="turb" type="fractalNoise"
          baseFrequency="0.009 0.008" numOctaves="2" seed="1" result="noise"/>
        <feDisplacementMap id="sv-disp" in="SourceGraphic" in2="noise"
          scale="244" xChannelSelector="R" yChannelSelector="G" result="disp"/>
        <feGaussianBlur id="sv-blur" in="disp" stdDeviation="26"/>
      </filter>
      <!-- Grain overlay filter: high-freq fractal noise desaturated to gray -->
      <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%"
              color-interpolation-filters="sRGB">
        <feTurbulence id="grain-turb" type="fractalNoise"
          baseFrequency="0.65 0.65" numOctaves="3" seed="5" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise"/>
      </filter>
      <clipPath id="avatar-clip">
        <circle cx="154" cy="154" r="154"/>
      </clipPath>
    </defs>
    <g clip-path="url(#avatar-clip)">
      <!-- Static neutral background (never colored) -->
      <rect id="sv-bg" width="308" height="308" fill="#1a1a1a"/>
      <!-- Three blobs — each filtered independently so all colors stay visible -->
      <g>
        <ellipse id="sv-b1" cx="154" cy="68"  rx="180" ry="180" filter="url(#blob-mesh)"/>
        <ellipse id="sv-b2" cx="228" cy="198" rx="180" ry="180" filter="url(#blob-mesh)" style="mix-blend-mode:soft-light"/>
        <ellipse id="sv-b3" cx="80"  cy="198" rx="180" ry="180" filter="url(#blob-mesh)" style="mix-blend-mode:soft-light"/>
      </g>
      <!-- Grain overlay: fractal noise at mix-blend-mode overlay -->
      <rect id="grain-rect" width="308" height="308"
            filter="url(#grain-filter)"
            style="mix-blend-mode:soft-light; opacity:0; pointer-events:none;"/>
    </g>
  </svg>
  <span id="avatar-initials"></span>
</div>

<!-- Text input -->
<div id="bottom-area">
  <div id="name-input"
       contenteditable="true"
       spellcheck="false"
       autocorrect="off"
       autocomplete="off"
       data-placeholder="type your name"></div>
</div>

<!-- Clear + dice cluster, bottom right -->
<div id="bottom-right">
  <button id="clear-btn">Clear</button>
  <button id="dice-btn" title="Randomize">&#x2684;</button>
</div>

<!-- Controls panel -->
<div id="controls">

  <!-- Turbulence (baseFrequency) -->
  <div class="ctrl-row">
    <span class="ctrl-label">turbulence</span>
    <!-- low: one broad smooth wave -->
    <svg class="ctrl-icon" viewBox="0 0 22 14" fill="none">
      <path d="M1,7 C4.5,2 7.5,2 11,7 C14.5,12 17.5,12 21,7"
            stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="range" id="sl-turb" min="3" max="25" step="1" value="9"
           title="baseFrequency">
    <!-- high: many tight ripples -->
    <svg class="ctrl-icon" viewBox="0 0 22 14" fill="none">
      <path d="M1,7 C2.2,4 3.4,4 4.6,7 C5.8,10 7,10 8.2,7 C9.4,4 10.6,4 11.8,7 C13,10 14.2,10 15.4,7 C16.6,4 17.8,4 19,7 C20.2,10 20.8,10 21,7"
            stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Octaves (numOctaves) -->
  <div class="ctrl-row">
    <span class="ctrl-label">octaves</span>
    <!-- low: single smooth arc -->
    <svg class="ctrl-icon" viewBox="0 0 22 14" fill="none">
      <path d="M1,10 C7,1 15,1 21,10"
            stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="range" id="sl-oct" min="1" max="6" step="1" value="2"
           title="numOctaves">
    <!-- high: stacked layered waves -->
    <svg class="ctrl-icon" viewBox="0 0 22 14" fill="none">
      <path d="M1,4 C3,2 5,2 7,4 C9,6 11,6 13,4 C15,2 17,2 19,4 C20,5 21,5 21,4"
            stroke="#888" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M1,8 C4,6 7,6 10,8 C13,10 16,10 19,8 C20,7 21,7 21,8"
            stroke="#888" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>
      <path d="M1,12 C6,10 16,10 21,12"
            stroke="#888" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    </svg>
  </div>

  <!-- Displacement (feDisplacementMap scale) -->
  <div class="ctrl-row">
    <span class="ctrl-label">displacement</span>
    <!-- low: clean circle -->
    <svg class="ctrl-icon" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="5.5" stroke="#888" stroke-width="1.5"/>
    </svg>
    <input type="range" id="sl-disp" min="20" max="200" step="2" value="122"
           title="scale">
    <!-- high: warped blobby path -->
    <svg class="ctrl-icon" viewBox="0 0 16 16" fill="none">
      <path d="M8,2 C12,1 14.5,4 13.5,8 C14.5,12 12,15 8,14 C4,15 1.5,12 2.5,8 C1.5,4 4,1 8,2 Z"
            stroke="#888" stroke-width="1.5"/>
    </svg>
  </div>

  <!-- Blur (feGaussianBlur stdDeviation) -->
  <div class="ctrl-row">
    <span class="ctrl-label">blur</span>
    <!-- low: crisp solid dot -->
    <svg class="ctrl-icon" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="5" fill="#888"/>
    </svg>
    <input type="range" id="sl-blur" min="3" max="28" step="0.5" value="13"
           title="stdDeviation">
    <!-- high: blurry dot -->
    <svg class="ctrl-icon" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="5" fill="#888" style="filter:blur(3px)"/>
    </svg>
  </div>

  <!-- Grain (overlay opacity) -->
  <div class="ctrl-row">
    <span class="ctrl-label">grain</span>
    <!-- low: smooth flat bar -->
    <svg class="ctrl-icon" viewBox="0 0 22 14" fill="none">
      <line x1="1" y1="7" x2="21" y2="7" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="range" id="sl-grain" min="0" max="0.7" step="0.01" value="0"
           title="grain">
    <!-- high: scattered dots -->
    <svg class="ctrl-icon" viewBox="0 0 22 14">
      <circle cx="2"  cy="3"  r="1"   fill="#888"/>
      <circle cx="7"  cy="11" r="1"   fill="#888"/>
      <circle cx="11" cy="2"  r="1"   fill="#888"/>
      <circle cx="16" cy="9"  r="1"   fill="#888"/>
      <circle cx="20" cy="4"  r="1"   fill="#888"/>
      <circle cx="4"  cy="8"  r="0.8" fill="#888"/>
      <circle cx="9"  cy="6"  r="0.8" fill="#888"/>
      <circle cx="14" cy="13" r="0.8" fill="#888"/>
      <circle cx="19" cy="12" r="0.8" fill="#888"/>
    </svg>
  </div>

  <!-- Divider -->
  <div class="ctrl-divider"></div>

  <!-- Palette swatches + mode toggle -->
  <div class="ctrl-row">
    <span class="ctrl-label">palette</span>

<script>
/* ════════════════════════════════════════════════════════════
   SEEDED PRNG  (mulberry32)
   ════════════════════════════════════════════════════════════ */
function makeRNG(seed) {
  let s = seed >>> 0;
  return () => {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function newSeed() { return (Math.random() * 0xFFFFFFF | 0) + 1; }

/* ════════════════════════════════════════════════════════════
   SYLLABLE COUNTING
   ════════════════════════════════════════════════════════════ */
function countSyllables(text) {
  let total = 0;
  for (const word of text.trim().split(/\s+/)) {
    const w = word.toLowerCase().replace(/[^a-z]/g, '');
    if (!w) continue;
    let n = (w.match(/[aeiou]+/g) || []).length;
    // subtract silent terminal -e (but not -ee, -le)
    if (w.length > 2 && /[^aeiou]e$/.test(w) && !/ee$|le$/.test(w) && n > 1) n--;
    total += Math.max(1, n);
  }
  return total;
}

/* ════════════════════════════════════════════════════════════
   COLOR GENERATION
   Harmonic modes: 2/3 analogous, 1/3 split-complementary.
   Saturation pulled ~5% below a "default" of 73 → 68.
   Avoid red (345–14°), hot-pink (300–345°), and brownish
   low-sat warm tones (15–34°).
   ════════════════════════════════════════════════════════════ */
const BASE_SAT = 68;
const BASE_LGT = 52;

function safeHue(h) {
  h = ((h % 360) + 360) % 360;
  // Push red/hot-pink/brown zone (296–34°) into safe greens+blues+purples
  if (h >= 296 || h < 35) {
    h = (h + 70) % 360;
    if (h < 40) h += 40; // ensure we clear the brown edge
  }
  return ((h % 360) + 360) % 360;
}

function makeColors(firstChar, seed, mode) {
  const r = makeRNG(seed);
  const j = () => r() * 10 - 5; // ±5 jitter for sat/lightness

  // Map A–Z across the safe hue space (40°–295°) so each letter
  // reliably produces a distinct starting color. Small ±20° session
  // jitter adds variety without clobbering the letter identity.
  const code  = firstChar.toLowerCase().charCodeAt(0) - 97; // 0–25
  const letterH = 40 + (code / 25) * 255; // 40° (A) → 295° (Z)
  const h1 = safeHue(letterH + (r() - 0.5) * 40);

  let h2, h3;
  if (mode === 'analogous') {
    // Wider spread (60–90°) so colors stay visually distinct after blur
    const spread = 60 + r() * 30;
    h2 = safeHue(h1 + spread);
    h3 = safeHue(h1 + spread * 2);
  } else {
    // split-complementary: naturally distinct (150° / 210°)
    h2 = safeHue(h1 + 150);
    h3 = safeHue(h1 + 210);
  }

  return [
    `hsl(${h1.toFixed(0)},${(BASE_SAT + j()).toFixed(0)}%,${(BASE_LGT + j()).toFixed(0)}%)`,
    `hsl(${h2.toFixed(0)},${(BASE_SAT + j()).toFixed(0)}%,${(BASE_LGT + j()).toFixed(0)}%)`,
    `hsl(${h3.toFixed(0)},${(BASE_SAT + j()).toFixed(0)}%,${(BASE_LGT + j()).toFixed(0)}%)`,
  ];
}

/* ════════════════════════════════════════════════════════════
   BLOB LAYOUTS — 6 triangular arrangements, 3 positions each.
   Each entry: [[b1 x%,y%], [b2 x%,y%], [b3 x%,y%]]
   Positions sit at ~120° intervals around centre so each blob
   occupies a distinct third of the circle.
   ════════════════════════════════════════════════════════════ */
const LAYOUTS = [
  [[.50, .22], [.74, .64], [.26, .64]],   // apex up
  [[.50, .78], [.26, .36], [.74, .36]],   // apex down
  [[.22, .30], [.78, .30], [.50, .82]],   // wide-top
  [[.22, .70], [.78, .70], [.50, .18]],   // wide-bottom
  [[.20, .50], [.72, .22], [.72, .78]],   // leftward
  [[.80, .50], [.28, .22], [.28, .78]],   // rightward
];

function pickLayout(seed) {
  const r = makeRNG(seed ^ 0xDEAD);
  return LAYOUTS[Math.floor(r() * LAYOUTS.length)];
}
function turbSeedFrom(seed) { return ((seed ^ 0xBEEF) % 997) + 1; }

/* ════════════════════════════════════════════════════════════
   DOM REFS
   ════════════════════════════════════════════════════════════ */
const svBg       = document.getElementById('sv-bg');
const svB1       = document.getElementById('sv-b1');
const svB2       = document.getElementById('sv-b2');
const svB3       = document.getElementById('sv-b3');
const turbEl     = document.getElementById('turb');
const dispEl     = document.getElementById('sv-disp');
const blurEl     = document.getElementById('sv-blur');
const initialsEl = document.getElementById('avatar-initials');
const nameInput  = document.getElementById('name-input');
const clearBtn   = document.getElementById('clear-btn');
const diceBtn    = document.getElementById('dice-btn');
const slTurb     = document.getElementById('sl-turb');
const slOct      = document.getElementById('sl-oct');
const slDisp     = document.getElementById('sl-disp');
const slBlur     = document.getElementById('sl-blur');
const slGrain    = document.getElementById('sl-grain');
const grainRect  = document.getElementById('grain-rect');
const swatchGroup = document.getElementById('swatch-group');
const modeBtn    = document.getElementById('mode-btn');
const swatchEls  = Array.from(document.querySelectorAll('.swatch'));

const NEUTRAL = '#C4C4C4';
const DEFAULT_PALETTE = ['#97643D', '#99994C', '#19331C', '#408070', '#508040', '#804040'];

/* ════════════════════════════════════════════════════════════
   PALETTE STATE
   ════════════════════════════════════════════════════════════ */
let paletteMode = false;
let palette = swatchEls.map(s => s.querySelector('input').value);

// Pick 3 spread-out colors from the 6-slot palette.
// Uses every-other-index spacing so adjacent swatches aren't grouped.
function selectTriadFromPalette(firstChar, seed) {
  const r    = makeRNG(seed ^ 0xCAFE);
  const code = firstChar.toLowerCase().charCodeAt(0) - 97;
  const base = (code + Math.floor(r() * 6)) % 6;
  return [palette[base % 6], palette[(base + 2) % 6], palette[(base + 4) % 6]];
}

function updatePaletteUI() {
  if (paletteMode) {
    // Palette driving — swatches bright, GEN pill looks disabled
    swatchGroup.classList.remove('dimmed');
    modeBtn.classList.add('pal-active');
  } else {
    // Generative mode — swatches dimmed, GEN pill looks enabled
    swatchGroup.classList.add('dimmed');
    modeBtn.classList.remove('pal-active');
  }
}

// Initial SVG element styles (with transitions)
// svBg is a static neutral — no color transitions needed
// Set initial styles without cssText so mix-blend-mode on b2/b3 is preserved
const BLOB_TRANSITION = 'fill 1.2s ease, opacity 1.2s ease';
[svB1, svB2, svB3].forEach(b => {
  b.style.fill       = NEUTRAL;
  b.style.opacity    = '0';
  b.style.transition = BLOB_TRANSITION;
});

/* ════════════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════════════ */
let sessSeed = newSeed();
let sessMode = Math.random() < 2/3 ? 'analogous' : 'split-complementary';
let colors   = [];    // up to 3 pre-generated harmonic colors
let visible  = 0;     // how many color layers are currently shown
let firstCh  = '';    // first non-space char that triggered color gen

/* ════════════════════════════════════════════════════════════
   APPLY SESSION GEOMETRY
   (positions + turbulence seed — shared by reset & dice)
   ════════════════════════════════════════════════════════════ */
function applyGeometry(seed) {
  const layout = pickLayout(seed);
  const SZ = 308;
  svB1.setAttribute('cx', (layout[0][0] * SZ).toFixed(1));
  svB1.setAttribute('cy', (layout[0][1] * SZ).toFixed(1));
  svB2.setAttribute('cx', (layout[1][0] * SZ).toFixed(1));
  svB2.setAttribute('cy', (layout[1][1] * SZ).toFixed(1));
  svB3.setAttribute('cx', (layout[2][0] * SZ).toFixed(1));
  svB3.setAttribute('cy', (layout[2][1] * SZ).toFixed(1));
  turbEl.setAttribute('seed', turbSeedFrom(seed));
}

/* ════════════════════════════════════════════════════════════
   RESET SESSION
   Called on Enter or ×. Snaps blobs off instantly, new seed.
   ════════════════════════════════════════════════════════════ */
function resetSession() {
  sessSeed = newSeed();
  sessMode = Math.random() < 2/3 ? 'analogous' : 'split-complementary';
  colors   = [];
  visible  = 0;
  firstCh  = '';

  // Disable transitions momentarily for a hard snap-off
  [svB1, svB2, svB3].forEach(b => { b.style.transition = 'none'; b.style.opacity = '0'; });
  svB1.setAttribute('rx', '180'); svB1.setAttribute('ry', '180');
  svB2.setAttribute('rx', '180'); svB2.setAttribute('ry', '180');
  svB3.setAttribute('rx', '180'); svB3.setAttribute('ry', '180');
  svBg.style.fill = '#1a1a1a';
  initialsEl.textContent = '';

  applyGeometry(sessSeed);

  // Re-enable transitions after a frame
  requestAnimationFrame(() => {
    [svB1, svB2, svB3].forEach(b => { b.style.transition = BLOB_TRANSITION; });
  });
}

/* ════════════════════════════════════════════════════════════
   UPDATE AVATAR
   Called on every keystroke. Drives initials + gradient state.
   ════════════════════════════════════════════════════════════ */
function updateAvatar(text) {
  const words = text.trim().split(/\s+/).filter(Boolean);

  // Initials
  if (words.length === 0) initialsEl.textContent = '';
  else if (words.length === 1) initialsEl.textContent = words[0][0].toUpperCase();
  else initialsEl.textContent = (words[0][0] + words[1][0]).toUpperCase();

  if (!text.trim()) {
    svB1.style.opacity = '0';
    svB2.style.opacity = '0';
    svB3.style.opacity = '0';
    svBg.style.fill = '#1a1a1a';
    visible = 0;
    colors  = [];
    firstCh = '';
    return;
  }

  // Generate colors keyed to first char — only regenerate when first char changes
  const ch = text.trim()[0];
  if (ch !== firstCh || colors.length === 0) {
    firstCh = ch;
    colors  = selectTriadFromPalette(ch, sessSeed);
    svBg.style.fill = colors[0];
  }

  const syl  = countSyllables(text);
  const need = Math.min(syl, 3);  // one blob per syllable, max 3

  // Grow blob 3 ~20% per extra syllable beyond 3
  const extra = Math.max(0, syl - 3);
  const grow  = 1 + extra * 0.2;
  svB3.setAttribute('rx', (180 * grow).toFixed(1));
  svB3.setAttribute('ry', (180 * grow).toFixed(1));

  // Fade in each blob as its syllable threshold is reached
  if (need >= 1 && visible < 1) {
    svB1.style.fill = colors[0];
    requestAnimationFrame(() => { svB1.style.opacity = '1'; });
    visible = 1;
  }
  if (need >= 2 && visible < 2) {
    svB2.style.fill = colors[1];
    requestAnimationFrame(() => { svB2.style.opacity = '1'; });
    visible = 2;
  }
  if (need >= 3 && visible < 3) {
    svB3.style.fill = colors[2];
    requestAnimationFrame(() => { svB3.style.opacity = '1'; });
    visible = 3;
  }

  // Keep fills in sync (handles live palette edits without re-triggering fade-in)
  if (visible >= 1) svB1.style.fill = colors[0];
  if (visible >= 2) svB2.style.fill = colors[1];
  if (visible >= 3) svB3.style.fill = colors[2];
}

/* ════════════════════════════════════════════════════════════
   EVENT LISTENERS
   ════════════════════════════════════════════════════════════ */
nameInput.addEventListener('input', () => {
  updateAvatar(nameInput.textContent);
});

nameInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  nameInput.textContent = '';
  resetSession();
});

clearBtn.addEventListener('click', () => {
  nameInput.textContent = '';
  resetSession();
  nameInput.focus();
});

// Dice: new seed, keep current text, transition colors in place
diceBtn.addEventListener('click', () => {
  sessSeed = newSeed();
  sessMode = Math.random() < 2/3 ? 'analogous' : 'split-complementary';
  colors   = [];  // force palette regeneration
  firstCh  = '';

  // New geometry (instant, blobs may be visible — that's the dice "roll" feel)
  applyGeometry(sessSeed);

  // Recompute colors and update fills (transitions handle the blend)
  const text = nameInput.textContent;
  if (text.trim()) {
    const ch = text.trim()[0];
    firstCh  = ch;
    colors   = selectTriadFromPalette(ch, sessSeed);
    if (visible >= 1) svB1.style.fill = colors[0];
    if (visible >= 2) svB2.style.fill = colors[1];
    if (visible >= 3) svB3.style.fill = colors[2];
  }
});

/* ════════════════════════════════════════════════════════════
   PALETTE CONTROLS
   ════════════════════════════════════════════════════════════ */
swatchEls.forEach((swatch, i) => {
  const input = swatch.querySelector('input');

  // Clicking the label (swatch circle) activates palette mode if not already on
  swatch.addEventListener('click', () => {
    if (!paletteMode) {
      paletteMode = true;
      colors  = [];
      firstCh = '';
      updatePaletteUI();
      updateAvatar(nameInput.textContent);
    }
  });

  // Live color picker updates — input fires while dragging, change fires on close
  function applyColorChange() {
    palette[i] = input.value;
    swatch.style.background = input.value;
    if (!paletteMode) {
      paletteMode = true;
      updatePaletteUI();
    }
    colors  = [];
    firstCh = '';
    updateAvatar(nameInput.textContent);
  }
  input.addEventListener('input', applyColorChange);
  input.addEventListener('change', applyColorChange);
});

// GEN pill — returns to generative mode and resets swatches to defaults
modeBtn.addEventListener('click', () => {
  paletteMode = false;
  palette = [...DEFAULT_PALETTE];
  swatchEls.forEach((swatch, i) => {
    swatch.style.background = DEFAULT_PALETTE[i];
    swatch.querySelector('input').value = DEFAULT_PALETTE[i];
  });
  colors  = [];
  firstCh = '';
  updatePaletteUI();
  updateAvatar(nameInput.textContent);
});

/* ════════════════════════════════════════════════════════════
   SLIDER CONTROLS
   ════════════════════════════════════════════════════════════ */

// Update the CSS filled-track indicator (--pct custom property)
function fillTrack(input) {
  const min = parseFloat(input.min);
  const max = parseFloat(input.max);
  const pct = ((parseFloat(input.value) - min) / (max - min)) * 100;
  input.style.setProperty('--pct', pct.toFixed(1) + '%');
}

// Apply all slider values to the SVG filter
function applyFilterParams() {
  // baseFrequency: internal int 3–25 → actual 0.003–0.025
  const freq = (parseInt(slTurb.value) / 1000).toFixed(3);
  turbEl.setAttribute('baseFrequency', `${freq} ${(parseFloat(freq) * 0.89).toFixed(3)}`);

  turbEl.setAttribute('numOctaves', slOct.value);

  dispEl.setAttribute('scale', slDisp.value);

  blurEl.setAttribute('stdDeviation', slBlur.value);

  grainRect.style.opacity = slGrain.value;
}

[slTurb, slOct, slDisp, slBlur, slGrain].forEach(sl => {
  sl.addEventListener('input', () => { fillTrack(sl); applyFilterParams(); });
});

// Seed initial track fills
[slTurb, slOct, slDisp, slBlur, slGrain].forEach(fillTrack);

/* ════════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════════ */
applyGeometry(sessSeed);
applyFilterParams();  // sync SVG filter attrs to slider defaults
nameInput.focus();

/* ════════════════════════════════════════════════════════════
   AVATAR GRID  (page 2)
   ════════════════════════════════════════════════════════════ */
// 100 two-word names — every pair of initials is unique (AA–JJ, 10×10)
const GRID_NAMES = [
  'Ava Allen','Ava Brooks','Ava Chen','Ava Davis','Ava Evans','Ava Ford','Ava Green','Ava Hart','Ava Irving','Ava James',
  'Ben Allen','Ben Brooks','Ben Chen','Ben Davis','Ben Evans','Ben Ford','Ben Green','Ben Hart','Ben Irving','Ben James',
  'Cleo Allen','Cleo Brooks','Cleo Chen','Cleo Davis','Cleo Evans','Cleo Ford','Cleo Green','Cleo Hart','Cleo Irving','Cleo James',
  'Dana Allen','Dana Brooks','Dana Chen','Dana Davis','Dana Evans','Dana Ford','Dana Green','Dana Hart','Dana Irving','Dana James',
  'Eli Allen','Eli Brooks','Eli Chen','Eli Davis','Eli Evans','Eli Ford','Eli Green','Eli Hart','Eli Irving','Eli James',
  'Faye Allen','Faye Brooks','Faye Chen','Faye Davis','Faye Evans','Faye Ford','Faye Green','Faye Hart','Faye Irving','Faye James',
  'Gray Allen','Gray Brooks','Gray Chen','Gray Davis','Gray Evans','Gray Ford','Gray Green','Gray Hart','Gray Irving','Gray James',
  'Hana Allen','Hana Brooks','Hana Chen','Hana Davis','Hana Evans','Hana Ford','Hana Green','Hana Hart','Hana Irving','Hana James',
  'Ines Allen','Ines Brooks','Ines Chen','Ines Davis','Ines Evans','Ines Ford','Ines Green','Ines Hart','Ines Irving','Ines James',
  'Jade Allen','Jade Brooks','Jade Chen','Jade Davis','Jade Evans','Jade Ford','Jade Green','Jade Hart','Jade Irving','Jade James',
];

let gridBuilt = false;

function buildAvatarGrid() {
  if (gridBuilt) return;
  gridBuilt = true;
  const container = document.getElementById('avatar-grid');
  const SZ = 308;

  GRID_NAMES.forEach((name, idx) => {
    const seed   = (idx + 1) * 7919;
    const layout = pickLayout(seed);
    const parts  = name.split(' ');
    const ch     = parts[0][0];
    const cols   = selectTriadFromPalette(ch, seed);
    const [p1, p2, p3] = layout;

    const initial = (parts[0][0] + parts[1][0]).toUpperCase();

    const div = document.createElement('div');
    div.className = 'grid-avatar';
    div.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 308 308">
      <rect width="308" height="308" fill="${cols[0]}"/>
      <ellipse cx="${(p1[0]*SZ).toFixed(1)}" cy="${(p1[1]*SZ).toFixed(1)}"
               rx="180" ry="180" fill="${cols[0]}" filter="url(#blob-mesh)"/>
      <ellipse cx="${(p2[0]*SZ).toFixed(1)}" cy="${(p2[1]*SZ).toFixed(1)}"
               rx="180" ry="180" fill="${cols[1]}" filter="url(#blob-mesh)"
               style="mix-blend-mode:soft-light"/>
      <ellipse cx="${(p3[0]*SZ).toFixed(1)}" cy="${(p3[1]*SZ).toFixed(1)}"
               rx="180" ry="180" fill="${cols[2]}" filter="url(#blob-mesh)"
               style="mix-blend-mode:soft-light"/>
      <text x="154" y="154" text-anchor="middle" dominant-baseline="central"
            font-family="Helvetica,Arial,sans-serif" font-size="88"
            font-weight="500" fill="rgba(255,255,255,0.9)">${initial}</text>
    </svg>`;
    container.appendChild(div);
  });
}

/* ════════════════════════════════════════════════════════════
   PAGE SWITCHING
   ════════════════════════════════════════════════════════════ */
const navP1 = document.getElementById('nav-p1');
const navP2 = document.getElementById('nav-p2');

/* ════════════════════════════════════════════════════════════
   AVATAR EXPORT — right-click → Download PNG
   ════════════════════════════════════════════════════════════ */
const avatarDiv  = document.getElementById('avatar');
const ctxMenu    = document.getElementById('avatar-ctx-menu');
const ctxDownBtn = document.getElementById('ctx-download-png');

avatarDiv.addEventListener('contextmenu', e => {
  e.preventDefault();
  ctxMenu.style.display = 'block';
  // Keep menu inside the viewport
  const menuW = 160, menuH = 48;
  const x = Math.min(e.clientX, window.innerWidth  - menuW - 8);
  const y = Math.min(e.clientY, window.innerHeight - menuH - 8);
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top  = y + 'px';
});

document.addEventListener('click',       () => { ctxMenu.style.display = 'none'; });
document.addEventListener('contextmenu', e => {
  if (!avatarDiv.contains(e.target)) ctxMenu.style.display = 'none';
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') ctxMenu.style.display = 'none';
});

ctxDownBtn.addEventListener('click', () => {
  ctxMenu.style.display = 'none';
  exportAvatarPNG();
});

function exportAvatarPNG() {
  const svgEl   = document.getElementById('avatar-svg');
  const initials = document.getElementById('avatar-initials').textContent.trim();
  const size    = 308;

  // Clone the live SVG so we can inject the initials as a proper SVG text node
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('width',  size);
  clone.setAttribute('height', size);

  if (initials) {
    const g = clone.querySelector('g[clip-path]');
    const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    textEl.setAttribute('x', '154');
    textEl.setAttribute('y', '154');
    textEl.setAttribute('text-anchor', 'middle');
    textEl.setAttribute('dominant-baseline', 'central');
    textEl.setAttribute('font-family', 'Helvetica, Arial, sans-serif');
    textEl.setAttribute('font-weight', '500');
    textEl.setAttribute('font-size', '123');
    textEl.setAttribute('fill', '#ffffff');
    textEl.textContent = initials;
    (g || clone).appendChild(textEl);
  }

  const svgStr = new XMLSerializer().serializeToString(clone);
  const blob   = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url    = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width  = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Clip to circle to match the avatar's border-radius:50%
    ctx.beginPath();
    ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
    ctx.clip();

    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);

    const rawName = nameInput.textContent.trim() || 'avatar';
    const filename = rawName.toLowerCase().replace(/\s+/g, '-') + '.png';

    canvas.toBlob(pngBlob => {
      const a = document.createElement('a');
      a.href     = URL.createObjectURL(pngBlob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }, 'image/png');
  };
  img.src = url;
}
</script>
</body>
</html>
